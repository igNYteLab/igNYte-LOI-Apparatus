name: Sync Source Repos

on:
  workflow_dispatch:
  schedule:
    - cron: "0 10 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.MONOREPO_SYNC_TOKEN || github.token }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "monorepo-sync"
          git config user.email "monorepo-sync@users.noreply.github.com"

      - name: Pull IgNYte-FPA
        run: |
          git subtree pull \
            --prefix=embedded \
            https://github.com/andre-llaneta/IgNYte-FPA.git \
            main

      - name: Pull IgNYte
        run: |
          git subtree pull \
            --prefix=webapp \
            https://github.com/ikasturirangan/ignyte.git \
            main

      - name: Push changes
        run: git push

[env:esp32-p4]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-p4
board_build.variant = dfrobot_firebeetle2_esp32p4
framework = arduino
monitor_speed = 115200
monitor_filters = send_on_enter
monitor_echo = yes
build_flags =
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DBOARD_PERIMAN_IO_LDO_AUTO=1
  -DBOARD_PERIMAN_IO_LDO0_CHANNEL=4
  -DBOARD_PERIMAN_IO_LDO0_GPIO_MIN=39
  -DBOARD_PERIMAN_IO_LDO0_GPIO_MAX=48
  -DBOARD_PERIMAN_IO_LDO0_VOLTAGE_MV=3300
lib_deps =
  bblanchon/ArduinoJson@^7.4.2
  teemuatlut/TMCStepper@^0.7.3
  waspinator/AccelStepper@^1.64
  adafruit/Adafruit MAX31856 library@^1.2.5
  adafruit/Adafruit SHT4x Library@^1.0.5
  adafruit/Adafruit BME680 Library@^2.0.5
  adafruit/Adafruit MCP23017 Arduino Library@^2.3.2

[env:esp32-p4-motor-debug]
extends = env:esp32-p4
build_flags =
  ${env:esp32-p4.build_flags}
  -DIGNYTE_MOTOR_ONLY_DEBUG=1
